name: lint

on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-required:
    name: Required lint (error + warning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install check-jsonschema pyyaml

      - name: Run named-refs lint (error + warning)
        id: named_refs
        run: |
          python scripts/lint/lint_named_refs.py PRISM.md \
            --severities error,warning > ndjson.required.txt
          # Translate NDJSON to GitHub annotations
          python - <<'PY'
          import json
          with open("ndjson.required.txt") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  o = json.loads(line)
                  level = "error" if o["severity"] == "error" else "warning"
                  msg = f'{o["rule"]} ({o["alias"]}): {o["message"]}'
                  print(f'::{level} file={o["file"]},line={o["line"]}::{msg}')
          PY

      - name: Validate frontmatter against schema (if schema available)
        run: |
          # Schema lives in the workshop repo per `design/tooling_conventions_micro_dds_rev1.md` A5.
          SCHEMA_URL="https://raw.githubusercontent.com/Ronkupper/PRISM-workshop/main/schemas/prism_frontmatter.schema.json"
          # Best-effort: workshop repo is private, so the URL may 404 in PRs
          # from forks. Skip gracefully when unavailable; PRISM-LINT-03 is
          # gated on Pattern A and the schema being publicly reachable.
          if curl -fsSL "$SCHEMA_URL" -o /tmp/schema.json 2>/dev/null; then
            # Extract YAML frontmatter (between the first two `---`) to JSON
            python - <<'PY'
          import json, yaml
          with open("PRISM.md") as f:
              src = f.read()
          parts = src.split("---", 2)
          fm = yaml.safe_load(parts[1])
          with open("/tmp/frontmatter.json", "w") as f:
              json.dump(fm, f, default=str)
          PY
            check-jsonschema --schemafile /tmp/schema.json /tmp/frontmatter.json
          else
            echo "::notice ::frontmatter schema not reachable from CI; PRISM-LINT-03 skipped"
          fi
          # Note: the schema check above is best-effort and PRISM.md-only. The
          # always-on structural gate is PRISM-LINT-10 (package-integrity step
          # below), which parses every shipped SKILL.md/command frontmatter with
          # no external schema, so an unreachable schema URL no longer leaves
          # frontmatter unvalidated.

      - name: Run cross-file lint — Skill archive (error + warning)
        run: |
          set +e
          python scripts/lint/lint_cross_file_refs.py \
            plugins/prism/skills/core/SKILL.md \
            plugins/prism/skills/core/PRISM_core.md \
            plugins/prism/skills/core/reference/*.md \
            plugins/prism/skills/core/lens/PRISM_lens_library.md \
            --severities error,warning > ndjson.archive.txt
          code=$?
          set -e
          python scripts/lint/ndjson_to_gh.py ndjson.archive.txt
          exit $code

      - name: Run package-integrity lint (error + warning)
        run: |
          set +e
          python scripts/lint/lint_package.py --severities error,warning > ndjson.pkg.txt
          code=$?
          set -e
          python scripts/lint/ndjson_to_gh.py ndjson.pkg.txt
          exit $code

      - name: Verify plugin package builds with clean contents
        run: |
          bash scripts/build-plugin-zip.sh
          VER=$(python -c "import json;print(json.load(open('plugins/prism/.claude-plugin/plugin.json'))['version'])")
          ZIP="PRISM-plugin-${VER}.zip"
          if unzip -Z1 "$ZIP" | grep -qiE '__pycache__|\.pyc$'; then
            echo "::error ::plugin package $ZIP contains __pycache__/.pyc"; exit 1
          fi
          for e in '.claude-plugin/plugin.json' 'commands/' 'skills/'; do
            if ! unzip -Z1 "$ZIP" | grep -q "^${e}"; then
              echo "::error ::plugin package missing expected root entry: $e"; exit 1
            fi
          done
          echo "package contents OK"

  lint-info:
    name: Informational lint (non-blocking)
    runs-on: ubuntu-latest
    needs: [lint-required]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run named-refs lint (info)
        id: info
        run: |
          python scripts/lint/lint_named_refs.py PRISM.md \
            --severities info > ndjson.info.txt
          python - <<'PY' > info_summary.md
          import json
          rows = []
          with open("ndjson.info.txt") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  rows.append(json.loads(line))
          print("## Informational lint findings\n")
          if not rows:
              print("_No info-level findings._")
          else:
              print(f"_{len(rows)} info-level findings (non-blocking)._\n")
              print("| Rule | File:Line | Message |")
              print("|---|---|---|")
              for o in rows[:50]:
                  msg = o["message"].replace("|", "\\|")
                  print(f'| `{o["rule"]}` | `{o["file"]}:{o["line"]}` | {msg} |')
              if len(rows) > 50:
                  print(f"\n_…and {len(rows) - 50} more._")
          PY

      - name: Post info summary as PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: prism-lint-info
          path: info_summary.md
