<svg width="100%" viewBox="0 0 680 940" xmlns="http://www.w3.org/2000/svg" role="img" font-family="var(--font-sans)">
<title>PRISM seams and the two-project structure</title>
<desc>How work flows through sessions: the Desk stages a pass, a fresh orchestration session builds the dispatch envelope, a PRISM-unaware vendor session runs it, and a consumer absorbs the returns (converging in a clean sub-agent). The operator only carries pastes across the seams.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--border-stronger)"/>
</marker>
</defs>
<style>
svg{--surface-1:#f6f7f9;--surface-2:#ffffff;--bg-accent:#eef2ff;--text-primary:#1a1d21;--text-secondary:#555b66;--text-muted:#8a909a;--text-accent:#4f46e5;--border:#e3e6ea;--border-strong:#cbd0d6;--border-stronger:#a9afb8;--font-sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
.sess{fill:var(--surface-1);stroke:var(--border-strong);stroke-width:1.25;}
.exec{fill:var(--surface-2);stroke:var(--border-stronger);stroke-width:1.4;stroke-dasharray:5 3;}
.seam{fill:var(--bg-accent);stroke:var(--text-accent);stroke-width:1.4;}
.t{fill:var(--text-primary);font-size:13px;font-weight:500;}
.s{fill:var(--text-secondary);font-size:11px;}
.tier{fill:var(--text-muted);font-size:9.5px;font-weight:500;letter-spacing:.04em;}
.seamt{fill:var(--text-accent);font-size:11.5px;font-weight:500;}
.e{stroke:var(--border-stronger);stroke-width:1.5;fill:none;}
.lbl{fill:var(--text-muted);font-size:10px;font-weight:500;}
.cap{fill:var(--text-muted);font-size:11px;}
</style>

<rect class="sess" x="14" y="12" width="15" height="11" rx="2"/>
<text class="s" x="34" y="21">PRISM session (loaded)</text>
<rect class="exec" x="210" y="12" width="15" height="11" rx="2"/>
<text class="s" x="230" y="21">Vendor run (PRISM-unaware)</text>
<rect class="seam" x="430" y="12" width="15" height="11" rx="2"/>
<text class="s" x="450" y="21">You act — a card / a paste</text>

<text class="tier" x="40" y="68">ONCE</text>
<rect class="sess" x="132" y="44" width="472" height="56" rx="8"/>
<text class="t" x="368" y="68" text-anchor="middle">SETUP — scaffold the workspace</text>
<text class="s" x="368" y="86" text-anchor="middle">creates 2 projects · installs SI · grades strategy</text>
<line class="e" x1="368" y1="100" x2="368" y2="120" marker-end="url(#ar)"/>

<text class="tier" x="40" y="150">ORCH</text>
<text class="tier" x="40" y="162">desk</text>
<rect class="sess" x="132" y="126" width="472" height="56" rx="8"/>
<text class="t" x="368" y="150" text-anchor="middle">PRISM DESK — the named session you reopen</text>
<text class="s" x="368" y="168" text-anchor="middle">re-sync (state + health) · stage the next pass</text>

<line class="e" x1="368" y1="182" x2="368" y2="198" marker-end="url(#ar)"/>
<rect class="seam" x="150" y="200" width="436" height="30" rx="6"/>
<text class="seamt" x="368" y="219" text-anchor="middle">① open a FRESH session → paste the opener</text>
<line class="e" x1="368" y1="230" x2="368" y2="246" marker-end="url(#ar)"/>

<text class="tier" x="40" y="274">ORCH</text>
<text class="tier" x="40" y="286">fresh</text>
<rect class="sess" x="132" y="252" width="472" height="56" rx="8"/>
<text class="t" x="368" y="276" text-anchor="middle">DISPATCH-BUILDER — render the envelope</text>
<text class="s" x="368" y="294" text-anchor="middle">just-in-time from live state · emits the dispatch card</text>

<line class="e" x1="368" y1="308" x2="368" y2="324" marker-end="url(#ar)"/>
<rect class="seam" x="150" y="326" width="436" height="30" rx="6"/>
<text class="seamt" x="368" y="345" text-anchor="middle">② paste the self-contained unit → the vendor · N seats</text>
<line class="e" x1="368" y1="356" x2="368" y2="372" marker-end="url(#ar)"/>

<text class="tier" x="40" y="400">EXEC</text>
<text class="tier" x="40" y="412">vendor</text>
<rect class="exec" x="132" y="378" width="472" height="56" rx="8"/>
<text class="t" x="368" y="402" text-anchor="middle">EXECUTION RUN — the vendor answers</text>
<text class="s" x="368" y="420" text-anchor="middle">new vendor session · PRISM-unaware · independent</text>

<line class="e" x1="368" y1="434" x2="368" y2="450" marker-end="url(#ar)"/>
<rect class="seam" x="150" y="452" width="436" height="30" rx="6"/>
<text class="seamt" x="368" y="471" text-anchor="middle">③ attach the N returns</text>
<line class="e" x1="368" y1="482" x2="368" y2="498" marker-end="url(#ar)"/>

<text class="tier" x="40" y="526">ORCH</text>
<rect class="sess" x="132" y="504" width="472" height="56" rx="8"/>
<text class="t" x="368" y="528" text-anchor="middle">DISPATCH-CONSUMER — absorb the returns</text>
<text class="s" x="368" y="546" text-anchor="middle">save · verify · converge via clean sub-agent · → Master</text>

<path class="e" d="M132,532 C40,532 40,154 126,154" marker-end="url(#ar)"/>
<text class="lbl" x="34" y="346" text-anchor="middle" transform="rotate(-90 34 346)">↻ repeat per pass</text>

<line class="e" x1="368" y1="560" x2="368" y2="582" marker-end="url(#ar)"/>
<text class="lbl" x="386" y="576">all passes closed</text>

<text class="tier" x="40" y="612">ORCH</text>
<rect class="sess" x="132" y="588" width="472" height="56" rx="8"/>
<text class="t" x="368" y="612" text-anchor="middle">CLOSURE — close gate → deliverables → send</text>
<text class="s" x="368" y="630" text-anchor="middle">report · workbook · share archive</text>

<rect x="132" y="676" width="472" height="86" rx="8" fill="none" stroke="var(--border)" stroke-width="1.25" stroke-dasharray="2 3"/>
<text class="t" x="148" y="698">The two projects Setup tells you to create</text>
<text class="cap" x="148" y="718">• Orchestration project — SI installed; hosts the Desk + the builder/consumer.</text>
<text class="cap" x="148" y="736">• Execution project — SI-less, memory-off; home for Claude vendor runs.</text>
<text class="cap" x="148" y="754">  (Other vendors — Gemini, ChatGPT, Grok — run in their own apps.)</text>

<text class="cap" x="368" y="800" text-anchor="middle">The tier tags (ORCH / EXEC) and role names are the system's bookkeeping —</text>
<text class="cap" x="368" y="818" text-anchor="middle">you never track them. You only act on the ①②③ seam cards.</text>
<text class="cap" x="368" y="840" text-anchor="middle">Why a seam exists: today's tools can't auto-pipe a Claude session into a Gemini one —</text>
<text class="cap" x="368" y="858" text-anchor="middle">so you carry the paste, and a card tells you exactly where it goes.</text>
</svg>
