<svg width="100%" viewBox="0 0 680 1060" xmlns="http://www.w3.org/2000/svg" role="img" font-family="var(--font-sans)">
<title>PRISM operator-facing flow</title>
<desc>The engagement arc — Setup, a repeating Execution round, and Closure — where every operator touchpoint is a rendered card following the same Open, Decide, Act, Hand-back turn.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--border-stronger)"/>
</marker>
</defs>
<style>
svg{--surface-1:#f6f7f9;--surface-2:#ffffff;--bg-accent:#eef2ff;--text-primary:#1a1d21;--text-secondary:#555b66;--text-muted:#8a909a;--text-accent:#4f46e5;--border:#e3e6ea;--border-strong:#cbd0d6;--border-stronger:#a9afb8;--font-sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
.op{fill:var(--bg-accent);stroke:var(--text-accent);stroke-width:1.5;}
.sys{fill:var(--surface-1);stroke:var(--border-strong);stroke-width:1.25;}
.dec{fill:var(--surface-2);stroke:var(--border-stronger);stroke-width:1.5;}
.t{fill:var(--text-primary);font-size:13px;font-weight:500;}
.s{fill:var(--text-secondary);font-size:11px;}
.lbl{fill:var(--text-muted);font-size:10.5px;font-weight:500;}
.e{stroke:var(--border-stronger);stroke-width:1.5;fill:none;}
.eq{stroke:var(--text-accent);stroke-width:1.4;fill:none;stroke-dasharray:4 3;}
.cap{fill:var(--text-muted);font-size:11px;}
.ph{fill:var(--text-accent);font-size:11px;font-weight:500;letter-spacing:.05em;}
</style>

<rect class="op" x="14" y="14" width="16" height="12" rx="3"/>
<text class="s" x="36" y="24">Operator sees / does — a card</text>
<rect class="sys" x="300" y="14" width="16" height="12" rx="3"/>
<text class="s" x="322" y="24">System — hidden machinery</text>

<rect class="op" x="220" y="44" width="240" height="34" rx="17"/>
<text class="t" x="340" y="65" text-anchor="middle">Operator: “begin an audit”</text>
<line class="e" x1="340" y1="78" x2="340" y2="96" marker-end="url(#arrow)"/>

<polygon class="dec" points="340,100 432,134 340,168 248,134"/>
<text class="t" x="340" y="131" text-anchor="middle">Full or quick?</text>
<text class="s" x="340" y="147" text-anchor="middle">scope choice</text>
<line class="e" x1="432" y1="134" x2="500" y2="134" marker-end="url(#arrow)"/>
<text class="lbl" x="455" y="126" text-anchor="middle">quick</text>
<rect class="op" x="500" y="112" width="166" height="44" rx="8"/>
<text class="t" x="583" y="131" text-anchor="middle">Quick mode</text>
<text class="s" x="583" y="147" text-anchor="middle">1 session → deliver</text>
<line class="e" x1="340" y1="168" x2="340" y2="190" marker-end="url(#arrow)"/>
<text class="lbl" x="356" y="184">full</text>

<text class="ph" x="40" y="214" text-anchor="middle" transform="rotate(-90 40 214)">SETUP (once)</text>

<rect class="op" x="200" y="192" width="280" height="50" rx="8"/>
<text class="t" x="340" y="213" text-anchor="middle">Setup scaffolds the workspace</text>
<text class="s" x="340" y="229" text-anchor="middle">create project · install SI · cards</text>
<line class="e" x1="340" y1="242" x2="340" y2="258" marker-end="url(#arrow)"/>
<rect class="sys" x="200" y="258" width="280" height="50" rx="8"/>
<text class="t" x="340" y="279" text-anchor="middle">Probes run</text>
<text class="s" x="340" y="295" text-anchor="middle">brief · stakeholders · lenses · falsifiers</text>
<line class="e" x1="340" y1="308" x2="340" y2="328" marker-end="url(#arrow)"/>

<polygon class="dec" points="340,330 452,366 340,402 228,366"/>
<text class="t" x="340" y="363" text-anchor="middle">Ratify strategy?</text>
<text class="s" x="340" y="379" text-anchor="middle">P0 → P1 gate</text>
<line class="e" x1="340" y1="402" x2="340" y2="424" marker-end="url(#arrow)"/>
<text class="lbl" x="362" y="418">ratified</text>

<rect x="150" y="424" width="380" height="288" rx="12" fill="none" stroke="var(--border)" stroke-width="1.25" stroke-dasharray="2 3"/>
<text class="ph" x="166" y="444">EXECUTION ROUND — repeats per pass</text>
<text class="cap" x="166" y="459">each step is one card: Open · Decide · Act · Hand-back</text>

<rect class="op" x="200" y="470" width="280" height="44" rx="8"/>
<text class="t" x="340" y="489" text-anchor="middle">Desk re-sync: state + health</text>
<text class="s" x="340" y="505" text-anchor="middle">where am I · all-clear / flags</text>
<line class="e" x1="340" y1="514" x2="340" y2="528" marker-end="url(#arrow)"/>

<rect class="op" x="200" y="528" width="280" height="44" rx="8"/>
<text class="t" x="340" y="547" text-anchor="middle">Stage pass → dispatch card</text>
<text class="s" x="340" y="563" text-anchor="middle">paste-ready · N seats · save-as</text>
<line class="e" x1="340" y1="572" x2="340" y2="586" marker-end="url(#arrow)"/>

<rect class="op" x="200" y="586" width="280" height="44" rx="8"/>
<text class="t" x="340" y="605" text-anchor="middle">Run: send to the seats</text>
<text class="s" x="340" y="621" text-anchor="middle">paste, or Cowork auto-drives</text>
<line class="e" x1="340" y1="630" x2="340" y2="644" marker-end="url(#arrow)"/>

<rect class="op" x="200" y="644" width="280" height="44" rx="8"/>
<text class="t" x="340" y="663" text-anchor="middle">Returns → card → converge</text>
<text class="s" x="340" y="679" text-anchor="middle">attach · verify · Master updated</text>

<line class="e" x1="340" y1="712" x2="340" y2="732" marker-end="url(#arrow)"/>

<polygon class="dec" points="340,734 452,770 340,806 228,770"/>
<text class="t" x="340" y="767" text-anchor="middle">All passes closed?</text>
<text class="s" x="340" y="783" text-anchor="middle">coverage check</text>
<path class="e" d="M228,770 C110,770 110,447 188,447" marker-end="url(#arrow)"/>
<text class="lbl" x="118" y="610" text-anchor="middle">no → next pass</text>
<line class="e" x1="340" y1="806" x2="340" y2="828" marker-end="url(#arrow)"/>
<text class="lbl" x="356" y="822">yes</text>

<polygon class="dec" points="340,830 452,866 340,902 228,866"/>
<text class="t" x="340" y="863" text-anchor="middle">Close gate: ratify close</text>
<text class="s" x="340" y="879" text-anchor="middle">3-layer · falsifiers checked</text>
<line class="e" x1="340" y1="902" x2="340" y2="922" marker-end="url(#arrow)"/>

<rect class="op" x="200" y="922" width="280" height="50" rx="8"/>
<text class="t" x="340" y="943" text-anchor="middle">Deliverables card</text>
<text class="s" x="340" y="959" text-anchor="middle">report · workbook · share archive</text>
<line class="e" x1="340" y1="972" x2="340" y2="990" marker-end="url(#arrow)"/>

<rect class="op" x="220" y="990" width="240" height="34" rx="17"/>
<text class="t" x="340" y="1011" text-anchor="middle">Send bundle → done</text>

<path class="eq" d="M583,156 C583,520 583,947 484,947" marker-end="url(#arrow)"/>
<text class="lbl" x="600" y="540" text-anchor="middle" transform="rotate(90 600 540)">quick → deliver</text>
</svg>
